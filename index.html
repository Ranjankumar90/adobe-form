<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --text: #14151a;
    --text-muted: #6b6e76;
    --border: #e6e7ea;
    --status-bg: #fef6e7;
    --status-dot: #c2790a;
    --status-text: #8a5a07;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
  }

  .mark {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--text);
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .content {
    max-width: 480px;
    width: 100%;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  p.sub {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  .status-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
  }

  .status-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--status-dot);
    flex-shrink: 0;
  }

  .status-label {
    font-size: 14px;
    font-weight: 500;
  }

  .status-pill {
    font-size: 12px;
    font-weight: 600;
    color: var(--status-text);
    background: var(--status-bg);
    padding: 4px 10px;
    border-radius: 100px;
    white-space: nowrap;
  }

  .eta {
    font-size: 13px;
    color: var(--text-muted);
  }

  .eta strong {
    color: var(--text);
    font-weight: 600;
  }

  @media (max-width: 520px) {
    header { padding: 20px; }
    main { padding: 32px 20px; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>

  <header>
    <div class="mark"></div>
  </header>

  <main>
    <div class="content">
      <h1>We're currently performing scheduled maintenance.</h1>
      <p class="sub">
        Our site is temporarily unavailable while we make some improvements.
        We expect to be back online shortly — thank you for your patience.
      </p>

      <div class="status-card">
        <div class="status-left">
          <span class="dot"></span>
          <span class="status-label">Maintenance in progress</span>
        </div>
        <span class="status-pill">In progress</span>
      </div>

      <p class="eta">Estimated to be back by <strong>6:00 PM IST</strong></p>
    </div>
  </main>

</body>
</html>
